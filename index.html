<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceForge - 多后端 TTS 语音合成</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">🎙️ VoiceForge</h1>
      <span class="subtitle">多后端 TTS 语音合成前端</span>
    </div>
    <div class="header-right">
      <button id="btnTheme" class="btn-icon" title="切换主题">🌙</button>
      <button id="btnSettings" class="btn-icon" title="设置">⚙️</button>
    </div>
  </header>

  <!-- 主体 -->
  <main class="main">
    <!-- 左侧面板 -->
    <aside class="sidebar">
      <!-- 后端选择 -->
      <section class="panel backend-select">
        <h3>🔌 后端引擎</h3>
        <div class="backend-list">
          <label class="backend-item" data-backend="funspeech">
            <input type="radio" name="backend" value="funspeech" checked>
            <span class="backend-info">
              <strong>🎵 FunSpeech</strong>
              <small>CosyVoice · NAS本地</small>
            </span>
            <span class="status-dot" id="status-funspeech"></span>
          </label>
          <label class="backend-item" data-backend="aliyun">
            <input type="radio" name="backend" value="aliyun">
            <span class="backend-info">
              <strong>☁️ 阿里云 TTS</strong>
              <small>流式合成 · 云端</small>
            </span>
            <span class="status-dot" id="status-aliyun"></span>
          </label>
          <label class="backend-item" data-backend="edge">
            <input type="radio" name="backend" value="edge">
            <span class="backend-info">
              <strong>🌐 Edge TTS</strong>
              <small>微软免费 · 浏览器</small>
            </span>
            <span class="status-dot" id="status-edge"></span>
          </label>
          <label class="backend-item" data-backend="browser">
            <input type="radio" name="backend" value="browser">
            <span class="backend-info">
              <strong>🔊 浏览器原生</strong>
              <small>SpeechSynthesis</small>
            </span>
            <span class="status-dot" id="status-browser"></span>
          </label>
        </div>
      </section>

      <!-- 音色选择（动态渲染） -->
      <section class="panel voice-select" id="voicePanel">
        <h3>🎤 音色</h3>
        <select id="voiceSelect" class="select-full"></select>
        <button id="btnRefreshVoices" class="btn-sm">🔄 刷新音色</button>
      </section>

      <!-- 参数面板 -->
      <section class="panel params-panel">
        <h3>🎚️ 参数</h3>
        <div class="param-group">
          <label>语速 <span id="speedVal">1.0x</span></label>
          <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="param-group" id="pitchGroup">
          <label>音调 <span id="pitchVal">0</span></label>
          <input type="range" id="pitch" min="-20" max="20" step="1" value="0">
        </div>
        <div class="param-group" id="volumeGroup">
          <label>音量 <span id="volumeVal">80</span></label>
          <input type="range" id="volume" min="0" max="100" step="5" value="80">
        </div>
        <div class="param-group" id="formatGroup">
          <label>输出格式</label>
          <select id="formatSelect" class="select-full">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
          </select>
        </div>
        <div class="param-group" id="streamingGroup">
          <label class="toggle-label">
            <input type="checkbox" id="streamingToggle" checked>
            <span>🎬 流式播放（边合成边听）</span>
          </label>
        </div>
      </section>

      <!-- 后端配置面板（阿里云等） -->
      <section class="panel backend-config" id="configFunspeech">
        <h3>⚙️ FunSpeech 配置</h3>
        <input type="text" id="fsBaseUrl" placeholder="http://192.168.1.2:8000" value="http://192.168.1.2:8000">
      </section>

      <section class="panel backend-config hidden" id="configAliyun">
        <h3>⚙️ 阿里云配置</h3>
        <input type="text" id="aliAccessKeyId" placeholder="AccessKey ID">
        <input type="password" id="aliAccessKeySecret" placeholder="AccessKey Secret">
        <input type="text" id="aliAppKey" placeholder="AppKey">
        <input type="text" id="aliEndpoint" placeholder="nls-gateway-cn-shanghai.aliyuncs.com" value="nls-gateway-cn-shanghai.aliyuncs.com">
      </section>
    </aside>

    <!-- 中间主区域 -->
    <section class="center">
      <div class="text-input-area">
        <textarea id="textInput" placeholder="在这里输入要合成的文本...&#10;&#10;支持多行文本，最大 5000 字" maxlength="5000"></textarea>
        <div class="text-meta">
          <span id="charCount">0 / 5000</span>
          <button id="btnClear" class="btn-sm">清空</button>
        </div>
      </div>

      <div class="action-bar">
        <button id="btnSynthesize" class="btn-primary">
          <span class="btn-icon-text">▶</span> 合成语音
        </button>
        <button id="btnDownload" class="btn-secondary" disabled>
          <span class="btn-icon-text">💾</span> 下载
        </button>
        <div class="synthesis-status" id="synthStatus"></div>
      </div>

      <!-- 音频播放器 -->
      <div class="player-area" id="playerArea">
        <audio id="audioPlayer" controls></audio>
      </div>

      <!-- 流式进度条 -->
      <div class="progress-bar hidden" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-text" id="progressText">已接收 0 帧</div>
      </div>
    </section>

    <!-- 右侧历史记录 -->
    <aside class="history-panel" id="historyPanel">
      <div class="history-header">
        <h3>📜 历史记录</h3>
        <button id="btnClearHistory" class="btn-sm btn-danger">清空全部</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">暂无历史记录</div>
      </div>
    </aside>
  </main>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay hidden" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ 全局设置</h2>
      <button class="btn-icon modal-close" id="btnCloseSettings">✖</button>
    </div>
    <div class="modal-body">
      <div class="setting-item">
        <label>FunSpeech 基础地址</label>
        <input type="text" id="setFsUrl" value="http://192.168.1.2:8000">
      </div>
      <div class="setting-item">
        <label>阿里云 Endpoint</label>
        <input type="text" id="setAliEndpoint" value="nls-gateway-cn-shanghai.aliyuncs.com">
      </div>
      <div class="setting-item">
        <label>阿里云 AccessKey ID</label>
        <input type="text" id="setAliKeyId" placeholder="AccessKey ID">
      </div>
      <div class="setting-item">
        <label>阿里云 AccessKey Secret</label>
        <input type="password" id="setAliKeySecret" placeholder="AccessKey Secret">
      </div>
      <div class="setting-item">
        <label>阿里云 AppKey</label>
        <input type="text" id="setAliAppKey" placeholder="AppKey">
      </div>
    </div>
    <div class="modal-footer">
      <button id="btnSaveSettings" class="btn-primary">保存</button>
      <button id="btnResetSettings" class="btn-secondary">恢复默认</button>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/audio.js"></script>
<script src="js/backends/funspeech.js"></script>
<script src="js/backends/aliyun.js"></script>
<script src="js/backends/edge.js"></script>
<script src="js/backends/browser.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
